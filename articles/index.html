<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Articles — World History Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<link rel="stylesheet" href="article.css?v=2">
<style>
/* Index-specific layout. Tokens, fonts and .cont-* accents come from article.css. */
body { background: var(--paper); }
.wh-nav { border-bottom: 1px solid var(--line); background: var(--card); }
.wh-nav .in { max-width: 1100px; margin: 0 auto; display: flex; align-items: center;
  gap: 18px; padding: 10px clamp(14px, 3vw, 40px); }
.wh-nav .brand { font-family: var(--serif); font-weight: 600; font-size: 17px;
  letter-spacing: -0.01em; color: var(--ink); text-decoration: none; margin-right: auto; }
.wh-nav .links { display: flex; gap: 7px; }
.wh-nav .links a { font-family: var(--mono); font-size: 12px; text-decoration: none;
  color: var(--ink-2); border: 1px solid transparent; padding: 4px 12px; border-radius: 999px; }
.wh-nav .links a:hover { border-color: var(--line); color: var(--ink); }
.wh-nav .links a[aria-current="page"] { border-color: var(--ink); color: var(--ink); background: var(--paper); }

.page { max-width: 1100px; margin: 0 auto; padding: 28px clamp(14px, 3vw, 40px) 96px; }
.masthead h1 { font-family: var(--serif); font-weight: 600; font-size: clamp(30px, 5vw, 44px);
  letter-spacing: -0.015em; line-height: 1.08; }
.masthead p { color: var(--ink-2); margin-top: 8px; max-width: 68ch; }

.group { margin-top: 40px; }
.group > h2 {
  font-family: var(--mono); font-weight: 600; font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.09em; color: var(--accent);
  display: flex; align-items: center; gap: 9px; padding-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.group > h2::before { content: ""; width: 12px; height: 12px; border-radius: 3px; background: var(--accent); flex: none; }
.group > h2 .n { margin-left: auto; color: var(--muted); font-weight: 500; }

.list { list-style: none; padding: 0; margin: 6px 0 0;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2px; }
.list a {
  display: block; text-decoration: none; color: inherit;
  padding: 13px 14px; border-radius: 10px; border: 1px solid transparent;
}
.list a:hover { background: var(--card); border-color: var(--ring); }
.list .row { display: flex; align-items: baseline; gap: 10px; }
.list .name { font-family: var(--serif); font-weight: 600; font-size: 18px; color: var(--ink); }
.list .dates { font-family: var(--mono); font-size: 11.5px; color: var(--muted);
  font-variant-numeric: tabular-nums; margin-left: auto; flex: none; white-space: nowrap; }
.list .blurb { color: var(--ink-2); font-size: 14.5px; line-height: 1.45; margin-top: 3px; }
.list a::before { content: none; }
</style>
</head>
<body>
<nav class="wh-nav">
  <div class="in">
    <a class="brand" href="../index.html">World History Timeline</a>
    <div class="links">
      <a href="../index.html">Timeline</a>
      <a href="../globe.html">🌍 Globe</a>
      <a href="index.html" aria-current="page">Articles</a>
    </div>
  </div>
</nav>

<div class="page">
  <header class="masthead">
    <h1>Articles</h1>
    <p>Every one of the 84 civilizations, each with its own page. Grouped by continent, in the order they begin.</p>
  </header>
  <div id="groups"></div>
</div>

<script src="../data.js"></script>
<script>
const CONTINENTS = [["africa","Africa"],["europe","Europe"],["asia","Asia"],["namerica","North America"],["samerica","South America"],["oceania","Oceania"]];
const fmtYear = y => y === 2026 ? "present"
  : y < 0 ? (-y >= 10000 ? (-y).toLocaleString("en") : -y) + " BCE"
  : y + " CE";

const groups = document.getElementById("groups");
for (const [key, label] of CONTINENTS) {
  const civs = CIVS.filter(c => c.continent === key).sort((a, b) => a.start - b.start);
  if (!civs.length) continue;
  const section = document.createElement("section");
  section.className = "group cont-" + key;
  const h2 = document.createElement("h2");
  h2.innerHTML = `${label}<span class="n">${civs.length}</span>`;
  section.appendChild(h2);
  const ul = document.createElement("ul");
  ul.className = "list";
  for (const c of civs) {
    const li = document.createElement("li");
    const a = document.createElement("a");
    a.href = `${c.id}.html`;
    const row = document.createElement("div");
    row.className = "row";
    const name = document.createElement("span");
    name.className = "name";
    name.textContent = c.name;
    const dates = document.createElement("span");
    dates.className = "dates";
    dates.textContent = `${fmtYear(c.start)} – ${fmtYear(c.end)}`;
    row.append(name, dates);
    const blurb = document.createElement("p");
    blurb.className = "blurb";
    blurb.textContent = c.blurb;
    a.append(row, blurb);
    li.appendChild(a);
    ul.appendChild(li);
  }
  section.appendChild(ul);
  groups.appendChild(section);
}
</script>
</body>
</html>
