<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World History Globe — 300,000 years in place</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
  :root {
    --africa:#2a78d6; --europe:#1baf7a; --asia:#d99400;
    --namerica:#e34948; --samerica:#7a5cc8; --oceania:#12988a;
    --serif:"Newsreader", Georgia, serif;
    --mono:"IBM Plex Mono", ui-monospace, Menlo, monospace;
    /* Night-sky surface. Values match the design system's night tokens. */
    --night:#0b0e13;
    --night-text:#eef1f6;
    --night-text-2:#cfd6e2;
    --night-muted:#aab3c2;
    --night-glass:rgba(12,16,22,0.66);
    --night-line:rgba(255,255,255,0.12);
    --night-line-strong:rgba(255,255,255,0.18);
    --night-btn-line:rgba(255,255,255,0.14);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; }
  body { background: #0b0e13; color: #eef1f6; overflow: hidden; font-family: var(--mono); }
  #globeViz { position: fixed; inset: 0; }
  #globeViz[hidden] { display: none; }

  /* Global menubar, night variant. */
  .topnav { position: fixed; top: 0; left: 0; right: 0; z-index: 15; }
  .wh-nav { background: var(--night-glass); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--night-line); }
  .wh-nav .in { max-width: 1500px; margin: 0 auto; display: flex; align-items: center;
    gap: 18px; padding: 10px clamp(14px, 3vw, 40px); }
  .wh-nav .brand { font-family: var(--serif); font-weight: 600; font-size: 17px;
    letter-spacing: -0.01em; color: var(--night-text); text-decoration: none; margin-right: auto; }
  .wh-nav .links { display: flex; gap: 7px; }
  .wh-nav .links a { font-family: var(--mono); font-size: 12px; text-decoration: none;
    color: var(--night-muted); border: 1px solid transparent; padding: 4px 12px; border-radius: 999px; }
  .wh-nav .links a:hover { border-color: var(--night-btn-line); color: var(--night-text); }
  .wh-nav .links a[aria-current="page"] { border-color: var(--night-text);
    color: var(--night); background: var(--night-text); }

  /* Flat map view — the same 84 civilizations on the equirectangular texture. */
  .stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    padding: 130px 24px 190px; }
  .stage[hidden] { display: none; }
  .flat { position: relative; width: 100%; max-width: 1080px; aspect-ratio: 2/1;
    border-radius: 12px; overflow: hidden; border: 1px solid var(--night-line-strong);
    box-shadow: 0 0 70px rgba(111,155,216,0.22); }
  .flat img { position: absolute; inset: 0; width: 100%; height: 100%; display: block; filter: brightness(.92); }
  .mk { position: absolute; transform: translate(-50%,-50%); border-radius: 50%; cursor: pointer;
    border: 1px solid rgba(0,0,0,0.4); box-shadow: 0 0 6px rgba(0,0,0,0.5);
    padding: 0; transition: opacity .3s ease, width .2s, height .2s, box-shadow .3s ease; }
  /* Alive at the scrubbed year: lit in its own continent colour, so scrubbing
     and Play read as things lighting up and fading. */
  .mk.alive { box-shadow: 0 0 6px rgba(0,0,0,0.5), 0 0 10px 2px var(--glow),
    0 0 20px 5px color-mix(in srgb, var(--glow) 45%, transparent); }
  .mk:hover, .mk:focus-visible { outline: 2px solid #fff; }
  /* The one wearing the label — Play's current subject, or whatever you're
     hovering. Has to beat 80-odd other lit markers, so: white ring, a much
     wider bloom, and a slow beat. */
  .mk.focus { z-index: 6; outline: 2px solid #fff; outline-offset: 1px;
    box-shadow: 0 0 6px rgba(0,0,0,0.5), 0 0 16px 5px var(--glow),
      0 0 44px 14px color-mix(in srgb, var(--glow) 65%, transparent);
    animation: mk-beat 1.6s ease-in-out infinite; }
  @keyframes mk-beat {
    0%, 100% { transform: translate(-50%,-50%) scale(1); }
    50%      { transform: translate(-50%,-50%) scale(1.45); }
  }
  @media (prefers-reduced-motion: reduce) { .mk.focus { animation: none; } }
  /* Anchored to its point: JS sets left/top to the POI's screen position and
     this lifts the box just above it. It's a button — click it for details. */
  #tip { position: fixed; left: 0; top: 0; transform: translate(-50%, -100%); z-index: 20;
    text-align: center; cursor: pointer; background: rgba(12,16,22,0.82); color: var(--night-text);
    border: 1px solid var(--night-line-strong); border-radius: 10px; padding: 8px 14px;
    white-space: nowrap; font: inherit; }
  #tip:hover, #tip:focus-visible { border-color: var(--night-text); outline: none; }
  #tip[hidden] { display: none; }
  #tip b { font-family: var(--serif); font-size: 20px; font-weight: 600; display: block; }
  #tip span { display: block; color: var(--night-muted); font-size: 12px; margin-top: 4px; }
  #tip .more { font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--night-muted); margin-top: 6px; opacity: .8; }

  /* Details for the civilization whose label you clicked. */
  #info { position: fixed; right: 18px; bottom: 150px; z-index: 25; width: min(340px, 92vw);
    background: var(--night-glass-strong, rgba(12,16,22,0.72)); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); border: 1px solid var(--night-line-strong);
    border-radius: 14px; padding: 18px 20px; }
  #info[hidden] { display: none; }
  #info .close { position: absolute; top: 10px; right: 12px; background: none; border: none;
    color: var(--night-muted); font-size: 20px; line-height: 1; cursor: pointer; }
  #info .close:hover { color: var(--night-text); }
  #info .badge { display: inline-flex; align-items: center; gap: 7px; font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.07em; color: var(--night-muted); }
  #info .badge i { width: 9px; height: 9px; border-radius: 3px; display: inline-block; }
  #info h3 { font-family: var(--serif); font-size: 22px; font-weight: 600; line-height: 1.15;
    margin-top: 6px; }
  #info .dates { font-size: 11.5px; color: var(--night-text-2); margin-top: 5px; }
  #info .blurb { font-family: var(--serif); font-size: 15px; line-height: 1.55;
    color: var(--night-text-2); margin-top: 10px; }
  #info .links { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  #info .links a { font-size: 11px; text-decoration: none; color: var(--night-text-2);
    border: 1px solid var(--night-btn-line); border-radius: 999px; padding: 5px 11px; }
  #info .links a:hover { border-color: var(--night-text); color: var(--night-text); }

  /* Sphere / Flat map switch, stacked above the legend. */
  .tr { position: fixed; top: 62px; right: 18px; z-index: 10; display: grid; gap: 10px; justify-items: end; }
  .viewseg { display: inline-flex; border: 1px solid var(--night-btn-line); border-radius: 999px;
    overflow: hidden; background: var(--night-glass); }
  .viewseg button { font-family: var(--mono); font-size: 11px; cursor: pointer;
    color: var(--night-text-2); background: transparent; border: none; padding: 6px 14px; }
  .viewseg button + button { border-left: 1px solid var(--night-btn-line); }
  .viewseg button[aria-pressed="true"] { background: var(--night-text); color: var(--night); }

  .panel {
    position: fixed; top: 62px; left: 18px; z-index: 10; max-width: min(420px, 92vw);
    background: rgba(12,16,22,0.66); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 16px 18px;
  }
  .panel h1 { font-family: var(--serif); font-weight: 600; font-size: 22px; line-height: 1.1; }
  .panel .sub { color: #aab3c2; font-size: 12px; margin-top: 6px; line-height: 1.5; }
  .panel a.back { color: #eef1f6; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,.35); }

  .scrubber {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 22px; z-index: 10;
    width: min(760px, 94vw);
    background: rgba(12,16,22,0.72); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 14px; padding: 14px 18px 16px;
  }
  .scrubber .row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
  .scrubber .year { font-family: var(--serif); font-size: 26px; font-weight: 600; }
  .scrubber .count { font-size: 12px; color: #aab3c2; }
  .scrubber .sliderrow { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
  .scrubber input[type=range] { flex: 1; accent-color: #eef1f6; cursor: pointer; }
  .scrubber .step {
    font-size: 13px; line-height: 1; padding: 6px 9px; color: #cfd6e2;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px; cursor: pointer; flex: none;
  }
  .scrubber .step:hover { background: rgba(255,255,255,0.12); }
  .scrubber .controls { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .scrubber button {
    font: inherit; font-size: 11px; cursor: pointer; color: #cfd6e2;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
    border-radius: 999px; padding: 4px 11px;
  }
  .scrubber button:hover { border-color: #eef1f6; color: #fff; }
  .scrubber button[aria-pressed="true"] { background: #eef1f6; color: #0b0e13; border-color: #eef1f6; }

  .legend { background: rgba(12,16,22,0.6); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 12px 14px; font-size: 11px; }
  .legend div { display: flex; align-items: center; gap: 7px; margin: 3px 0; color: #cfd6e2; }
  .legend i { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }
</style>
</head>
<body>
<div class="topnav">
  <nav class="wh-nav night">
    <div class="in">
      <a class="brand" href="index.html">World History Timeline</a>
      <div class="links">
        <a href="index.html">Timeline</a>
        <a href="globe.html" aria-current="page">🌍 Globe</a>
        <a href="articles/index.html">Articles</a>
      </div>
    </div>
  </nav>
</div>

<div id="globeViz"></div>

<div class="stage" id="stage" hidden>
  <div class="flat" id="flat">
    <img src="vendor/earth-day.jpg" alt="World map">
  </div>
</div>

<button id="tip" type="button" title="Click for details" hidden></button>

<aside id="info" aria-label="Civilization details" hidden>
  <button class="close" type="button" aria-label="Close">×</button>
  <span class="badge"><i></i><span class="badge-text"></span></span>
  <h3></h3>
  <div class="dates"></div>
  <p class="blurb"></p>
  <div class="links">
    <a class="article" target="_blank" rel="noopener">Read the article →</a>
    <a class="wiki" target="_blank" rel="noopener">Wikipedia ↗</a>
  </div>
</aside>

<div class="panel">
  <h1>The history globe</h1>
  <p class="sub">Every civilization where it actually lived. Drag the slider to scrub time and watch them light up and fade. <a class="back" href="index.html">← back to the grid</a></p>
</div>

<div class="tr">
  <span class="viewseg">
    <button id="vSphere" type="button" aria-pressed="true">Sphere</button>
    <button id="vFlat" type="button" aria-pressed="false">Flat map</button>
  </span>
  <div class="legend" id="legend"></div>
</div>

<div class="scrubber">
  <div class="row">
    <span class="year" id="year">—</span>
    <span class="count" id="count"></span>
  </div>
  <div class="sliderrow">
    <button id="prev" type="button" class="step" aria-label="Previous event">◀</button>
    <input type="range" id="slider" min="0" max="0" value="0" step="1" aria-label="Year" list="stops">
    <button id="next" type="button" class="step" aria-label="Next event">▶</button>
  </div>
  <datalist id="stops"></datalist>
  <div class="controls">
    <button id="play" type="button">▶ Play</button>
    <button id="arcs" type="button" aria-pressed="true">✈ Routes</button>
    <button data-jump="-300000" type="button">300k BCE</button>
    <button data-jump="-3000" type="button">3000 BCE</button>
    <button data-jump="1" type="button">1 CE</button>
    <button data-jump="1500" type="button">1500</button>
    <button data-jump="2026" type="button">Today</button>
  </div>
</div>

<script src="data.js"></script>
<script src="vendor/globe.gl.min.js"></script>
<script>
// Representative heartland coordinates [lat, lng] per civilization id.
// Kept here (not in data.js) so data.js's one-line-per-civ format stays intact.
const COORDS = {
  "homo-sapiens":[0,37], "out-of-africa":[13,43], "green-sahara":[21,12], "ancient-egypt":[26,31],
  "kush":[17,34], "carthage":[36.8,10.3], "aksum":[14,38.7], "ghana-empire":[15.7,-8],
  "mali-empire":[16.8,-3], "songhai":[16.3,-0.05], "atlantic-slave-trade":[6,2], "colonial-africa":[0,22],
  "modern-africa":[4,22],
  "neanderthals":[45,4], "ice-age-europe":[45,1.5], "megaliths":[51.2,-1.8], "minoans":[35.2,25.1],
  "greek-city-states":[38,23.7], "rome":[41.9,12.5], "byzantine":[41.0,28.98], "medieval-europe":[48,8],
  "vikings":[60,8], "crusades":[31.8,35.2], "renaissance":[43.8,11.25], "colonial-empires":[39,-6],
  "industrial-revolution":[53.5,-2.2], "world-wars":[50,10], "cold-war-eu":[50.85,4.35],
  "fertile-crescent":[33,43], "neolithic-china":[35,113], "sumer":[31,46], "indus-valley":[27.3,68.1],
  "babylon":[32.5,44.4], "shang":[36.1,114.4], "vedic-india":[29,77], "zhou":[34.3,108.9],
  "achaemenid-persia":[29.9,52.9], "maurya":[25.6,85.1], "han":[34,109], "silk-road":[40,76],
  "gupta":[25,82], "tang":[34.2,108.95], "song":[34.8,114.3], "mongol-empire":[47.2,102.8],
  "ottoman":[41.0,29.0], "ming":[39.9,116.4], "mughal":[27.2,78], "tokugawa":[35.7,139.7],
  "qing":[39.9,116.5], "meiji":[35.7,139.75], "modern-asia":[30,100],
  "beringia":[65,-168], "mound-builders":[32.6,-91.4], "olmec":[18.1,-94], "maya":[17.2,-89.6],
  "teotihuacan":[19.7,-98.8], "hopewell":[39.4,-83], "ancestral-pueblo":[36.06,-107.96],
  "mississippian":[38.66,-90.06], "aztec":[19.4,-99.1], "colonial-namerica":[30,-90], "usa":[39,-98],
  "first-south-americans":[-41.5,-73.2], "norte-chico":[-10.9,-77.5], "chavin":[-9.6,-77.2],
  "paracas":[-13.8,-76.3], "moche":[-8.1,-79], "nazca":[-14.8,-74.9], "tiwanaku":[-16.55,-68.7],
  "wari":[-13.1,-74.2], "inca":[-13.5,-71.98], "spanish-samerica":[-12,-77],
  "independence-samerica":[-10,-70], "modern-samerica":[-15,-58],
  "aboriginal-australians":[-25,133], "kuk-agriculture":[-5.8,144.3], "austronesian-expansion":[5,125],
  "lapita":[-5,150], "polynesian-navigation":[-17,-149], "ancient-hawaii":[20,-157],
  "maori":[-41,174], "european-oceania":[-30,133], "british-australia":[-33.87,151.2],
  "modern-oceania":[-28,140],
};
const COLORS = { africa:"#2a78d6", europe:"#1baf7a", asia:"#d99400", namerica:"#e34948", samerica:"#7a5cc8", oceania:"#12988a" };
const NAMES = { africa:"Africa", europe:"Europe", asia:"Asia", namerica:"North America", samerica:"South America", oceania:"Oceania" };

// Great migrations, trade routes and expansions — animated arcs, shown for the years they were active.
const ROUTES = [
  {label:"Out-of-Africa migration", from:[9,40], to:[31,35], startYear:-70000, endYear:-45000, type:"migration"},
  {label:"Peopling of the Americas", from:[66,170], to:[65,-155], startYear:-20000, endYear:-14000, type:"migration"},
  {label:"Peopling of the Americas", from:[65,-155], to:[-41.5,-73], startYear:-16000, endYear:-12000, type:"migration"},
  {label:"Austronesian expansion", from:[23.7,121], to:[-6,106], startYear:-3000, endYear:-1500, type:"migration"},
  {label:"Austronesian expansion", from:[0.5,114], to:[-18.9,47.5], startYear:300, endYear:1200, type:"migration"},
  {label:"Polynesian voyaging", from:[-13.8,-171.8], to:[20,-157], startYear:300, endYear:800, type:"migration"},
  {label:"Polynesian voyaging", from:[-13.8,-171.8], to:[-27.1,-109.4], startYear:700, endYear:1200, type:"migration"},
  {label:"Polynesian voyaging", from:[-13.8,-171.8], to:[-37,175], startYear:1200, endYear:1300, type:"migration"},
  {label:"Silk Road", from:[34.3,108.9], to:[41,29], startYear:-130, endYear:1450, type:"trade"},
  {label:"Trans-Saharan gold/salt trade", from:[16.8,-3], to:[31.6,-8], startYear:700, endYear:1600, type:"trade"},
  {label:"Atlantic slave trade", from:[6,3], to:[18.5,-70], startYear:1500, endYear:1870, type:"trade"},
  {label:"Columbian voyages", from:[37.2,-6.4], to:[24,-75], startYear:1492, endYear:1600, type:"exchange"},
  {label:"Viking voyages", from:[59,10.7], to:[54,-1], startYear:793, endYear:1000, type:"conquest"},
  {label:"Viking voyages", from:[64,-22], to:[51.6,-55.5], startYear:985, endYear:1020, type:"migration"},
  {label:"Viking voyages", from:[59.3,18.1], to:[41,29], startYear:800, endYear:1100, type:"trade"},
  {label:"Mongol conquests", from:[47.2,102.8], to:[39.9,116.4], startYear:1206, endYear:1279, type:"conquest"},
  {label:"Mongol conquests", from:[47.2,102.8], to:[47.5,19], startYear:1206, endYear:1242, type:"conquest"},
  {label:"Indian Ocean monsoon trade", from:[12.8,45], to:[11.25,75.8], startYear:-100, endYear:1500, type:"trade"},
  {label:"Indian Ocean monsoon trade", from:[11.25,75.8], to:[2.2,102.25], startYear:-100, endYear:1500, type:"trade"},
  {label:"Bantu expansion", from:[6,10], to:[-26,28], startYear:-1000, endYear:500, type:"migration"},
];
const ARC_COLORS = { migration:"#e6b800", trade:"#37c0d8", exchange:"#8f7cff", conquest:"#ff5a4d" };

const fmtYear = y => y === 2026 ? "present"
  : y < 0 ? (-y >= 10000 ? (-y).toLocaleString("en") : -y) + " BCE"
  : y + " CE";

// attach coords; drop any civ missing a coordinate (defensive)
const PLACED = CIVS.filter(c => COORDS[c.id]).map(c => ({ ...c, lat: COORDS[c.id][0], lng: COORDS[c.id][1] }));

// slider stops = every year at which the alive-set changes (each start and each end), sorted & unique
const STOPS = [...new Set(PLACED.flatMap(c => [c.start, c.end]))].sort((a, b) => a - b);
const nearestStop = y => STOPS.reduce((best, s) => Math.abs(s - y) < Math.abs(best - y) ? s : best, STOPS[0]);

const globe = Globe()(document.getElementById("globeViz"))
  .globeImageUrl("vendor/earth-day.jpg")
  .backgroundColor("#0b0e13")
  .atmosphereColor("#6f9bd8")
  .pointLat("lat").pointLng("lng")
  .pointColor(d => COLORS[d.continent])
  // longer-lived civilizations sit taller and wider (log-scaled span)
  .pointAltitude(d => 0.015 + 0.06 * Math.min(1, Math.log10(Math.max(d.end - d.start, 10)) / 5))
  .pointRadius(d => 0.35 + 0.45 * Math.min(1, Math.log10(Math.max(d.end - d.start, 10)) / 5))
  .pointLabel(d => `<div style="font-family:sans-serif;font-size:12px"><b>${d.name}</b><br>${fmtYear(d.start)} – ${fmtYear(d.end)}</div>`)
  .onPointClick(d => { window.open(`articles/${d.id}.html`, "_blank", "noopener"); })
  .arcStartLat(d => d.from[0]).arcStartLng(d => d.from[1])
  .arcEndLat(d => d.to[0]).arcEndLng(d => d.to[1])
  .arcColor(d => [ARC_COLORS[d.type] || "#ffffff", ARC_COLORS[d.type] || "#ffffff"])
  .arcStroke(0.6)
  .arcDashLength(0.5).arcDashGap(0.25).arcDashAnimateTime(2600)
  .arcAltitudeAutoScale(0.45)
  .arcLabel(d => `<div style="font-family:sans-serif;font-size:12px"><b>${d.label}</b><br>${d.type} · ${fmtYear(d.startYear)} – ${fmtYear(d.endYear)}</div>`);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.45;

const slider = document.getElementById("slider");
const yearEl = document.getElementById("year");
const countEl = document.getElementById("count");
slider.max = STOPS.length - 1;
// one tick per stop (every slider position is an alive-set change)
document.getElementById("stops").innerHTML = STOPS.map((_, i) => `<option value="${i}">`).join("");

function aliveAt(year) { return PLACED.filter(c => c.start <= year && c.end >= year); }

// Flat map: the same PLACED civilizations on the equirectangular texture, so
// lat/lng map straight onto percentage offsets. Radius is log-scaled by
// longevity, the same idea as the sphere's point sizing.
const flatEl = document.getElementById("flat");
const tip = document.getElementById("tip");
const mkRadius = c => Math.max(5, Math.min(16, 3 + Math.log10(Math.max(c.end - c.start, 10)) * 2.6));
// The one name-and-dates callout: flat-map hover, and whatever Play is visiting.
// It rides its subject rather than floating in a corner, so on the sphere it's
// anchored to a lat/lng and re-projected every frame, and on the flat map to the
// marker element itself.
let tipAnchor = null;   // { lat, lng } on the sphere, { el } on the flat map
let tipRaf = null;
let tipCiv = null;      // whose label is showing — the details the tip opens
let tipHideTimer = null;
let tipMarker = null;   // the flat marker wearing the label, singled out from the lit crowd
function setFocusMarker(el) {
  if (tipMarker && tipMarker !== el) tipMarker.classList.remove("focus");
  tipMarker = el || null;
  if (tipMarker) tipMarker.classList.add("focus");
}
function placeTip() {
  if (!tipAnchor) return;
  let x, y, facing = true;
  if (tipAnchor.el) {
    const r = tipAnchor.el.getBoundingClientRect();
    x = r.left + r.width / 2;
    y = r.top - 6;
  } else {
    const s = globe.getScreenCoords(tipAnchor.lat, tipAnchor.lng, 0.06);
    const p = globe.getCoords(tipAnchor.lat, tipAnchor.lng, 0.06);
    const c = globe.camera().position;
    // the surface normal is the point itself (globe is centred on the origin);
    // if it doesn't lean toward the camera the POI is round the back
    facing = p.x * (c.x - p.x) + p.y * (c.y - p.y) + p.z * (c.z - p.z) > 0;
    x = s.x;
    y = s.y - 10;
  }
  const half = tip.offsetWidth / 2;
  tip.style.left = Math.max(half + 4, Math.min(window.innerWidth - half - 4, x)) + "px";
  tip.style.top = Math.max(tip.offsetHeight + 4, y) + "px";
  tip.style.visibility = facing ? "visible" : "hidden";
}
function showTip(c, el) {
  const name = document.createElement("b");
  name.textContent = c.name;
  const dates = document.createElement("span");
  dates.textContent = `${fmtYear(c.start)} – ${fmtYear(c.end)}`;
  const more = document.createElement("span");
  more.className = "more";
  more.textContent = "Click for details";
  tip.replaceChildren(name, dates, more);
  tipCiv = c;
  tipAnchor = el ? { el } : { lat: c.lat, lng: c.lng };
  setFocusMarker(el);
  tip.hidden = false;
  placeTip();
  if (tipRaf) cancelAnimationFrame(tipRaf);
  if (!el) {
    // Play flies the camera for 1.5s and the globe can spin — keep up with it
    const follow = () => {
      if (!tipAnchor || tipAnchor.el || tip.hidden) { tipRaf = null; return; }
      placeTip();
      tipRaf = requestAnimationFrame(follow);
    };
    tipRaf = requestAnimationFrame(follow);
  }
}
function hideTip() {
  clearTimeout(tipHideTimer);
  tip.hidden = true;
  tipAnchor = null;
  setFocusMarker(null);
  if (tipRaf) { cancelAnimationFrame(tipRaf); tipRaf = null; }
}
// Reaching from a marker to its label crosses a gap, and leaving the marker
// fires mouseleave — so don't yank the label away mid-reach.
const scheduleHideTip = () => { clearTimeout(tipHideTimer); tipHideTimer = setTimeout(hideTip, 160); };
tip.addEventListener("mouseenter", () => clearTimeout(tipHideTimer));
tip.addEventListener("mouseleave", scheduleHideTip);
tip.addEventListener("click", () => { if (tipCiv) openInfo(tipCiv); });

// Details panel — opened by clicking a label. Clicking a point or a marker
// still goes straight to the article.
const info = document.getElementById("info");
function openInfo(c) {
  info.querySelector(".badge i").style.background = COLORS[c.continent];
  info.querySelector(".badge-text").textContent = NAMES[c.continent];
  info.querySelector("h3").textContent = c.name;
  info.querySelector(".dates").textContent =
    `${fmtYear(c.start)} – ${fmtYear(c.end)} · ${(c.end - c.start).toLocaleString("en")} years`;
  info.querySelector(".blurb").textContent = c.blurb;
  info.querySelector(".article").href = `articles/${c.id}.html`;
  const wiki = info.querySelector(".wiki");
  if (c.wiki) { wiki.href = c.wiki; wiki.hidden = false; } else { wiki.hidden = true; }
  info.hidden = false;
}
function closeInfo() { info.hidden = true; }
info.querySelector(".close").addEventListener("click", closeInfo);
document.addEventListener("keydown", e => { if (e.key === "Escape") { closeInfo(); hideTip(); } });
const marks = PLACED.map(c => {
  const b = document.createElement("button");
  b.type = "button";
  b.className = "mk";
  b.title = c.name;
  const r = mkRadius(c);
  b.style.left = (c.lng + 180) / 360 * 100 + "%";
  b.style.top = (90 - c.lat) / 180 * 100 + "%";
  b.style.width = b.style.height = r + "px";
  b.style.background = COLORS[c.continent];
  b.style.setProperty("--glow", COLORS[c.continent]);
  const show = () => { clearTimeout(tipHideTimer); showTip(c, b); };
  b.addEventListener("mouseenter", show);
  b.addEventListener("mouseleave", scheduleHideTip);
  b.addEventListener("focus", show);
  b.addEventListener("blur", scheduleHideTip);
  // same as the sphere's points: a marker opens its article
  b.addEventListener("click", () => window.open(`articles/${c.id}.html`, "_blank", "noopener"));
  flatEl.appendChild(b);
  return { c, el: b };
});
const markerById = new Map(marks.map(m => [m.c.id, m.el]));
function renderFlat(year) {
  for (const { c, el } of marks) {
    const alive = c.start <= year && c.end >= year;
    el.classList.toggle("alive", alive);
    el.style.opacity = alive ? 0.95 : 0;
    el.style.pointerEvents = alive ? "auto" : "none";
  }
}

let showArcs = true;
let view = "sphere";
function render(idx) {
  const year = STOPS[idx];
  const alive = aliveAt(year);
  globe.pointsData(alive);
  // arcs are a sphere-only rendering
  globe.arcsData(showArcs && view === "sphere" ? ROUTES.filter(a => a.startYear <= year && a.endYear >= year) : []);
  renderFlat(year);
  yearEl.textContent = fmtYear(year);
  countEl.textContent = `${alive.length} civilization${alive.length === 1 ? "" : "s"} present`;
}

slider.addEventListener("input", () => render(+slider.value));

// step one event left/right
const step = n => { const v = Math.min(+slider.max, Math.max(0, +slider.value + n)); slider.value = v; render(v); };
document.getElementById("prev").addEventListener("click", () => step(-1));
document.getElementById("next").addEventListener("click", () => step(1));

// era jump buttons
document.querySelectorAll("[data-jump]").forEach(b => {
  b.addEventListener("click", () => {
    const idx = STOPS.indexOf(nearestStop(+b.dataset.jump));
    slider.value = idx; render(idx);
  });
});

// play/pause: visit each civilization's birth in order, spinning the globe to its
// heartland. Simultaneous births are distinct events, so they're shown one at a
// time 5s apart. Auto-rotate is paused while playing so the focus stays put.
const EVENTS = PLACED.slice().sort((a, b) => a.start - b.start || a.end - b.end);
let timer = null, evIdx = 0;
const play = document.getElementById("play");
function showEvent(i) {
  const ev = EVENTS[i];
  const idx = STOPS.indexOf(ev.start);
  slider.value = idx; render(idx);
  // say who we just flew to — the globe's own point label only fires on hover,
  // so without this Play swings somewhere and never names it. On the flat map
  // the subject is the marker, not a point on a globe that isn't on screen.
  showTip(ev, view === "flat" ? markerById.get(ev.id) : undefined);
  // Play narrates itself: the details come up for each civilization it visits,
  // no clicking required
  openInfo(ev);
  // nothing to fly to when the sphere isn't the one on screen
  if (view === "sphere") globe.pointOfView({ lat: ev.lat, lng: ev.lng, altitude: 1.8 }, 1500);
}
play.addEventListener("click", () => {
  if (timer) {
    clearInterval(timer); timer = null;
    play.textContent = "▶ Play"; play.setAttribute("aria-pressed", "false");
    globe.controls().autoRotate = view === "sphere";
    hideTip();
    return;
  }
  play.textContent = "❚❚ Pause"; play.setAttribute("aria-pressed", "true");
  globe.controls().autoRotate = false;
  showEvent(evIdx);
  timer = setInterval(() => { evIdx = (evIdx + 1) % EVENTS.length; showEvent(evIdx); }, 5000);
});

// routes toggle
const arcsBtn = document.getElementById("arcs");
arcsBtn.addEventListener("click", () => {
  showArcs = !showArcs;
  arcsBtn.setAttribute("aria-pressed", showArcs);
  render(+slider.value);
});

// Sphere / Flat map. Sphere is the live 3D globe; flat is the static map.
const globeEl = document.getElementById("globeViz");
const stage = document.getElementById("stage");
const vSphere = document.getElementById("vSphere");
const vFlat = document.getElementById("vFlat");
function setView(v) {
  view = v;
  const flat = v === "flat";
  globeEl.hidden = flat;
  stage.hidden = !flat;
  hideTip();
  vSphere.setAttribute("aria-pressed", !flat);
  vFlat.setAttribute("aria-pressed", flat);
  // don't spin a canvas nobody can see; Play owns autoRotate while it runs
  globe.controls().autoRotate = !flat && !timer;
  // routes only exist on the sphere, so don't leave a dead toggle behind
  arcsBtn.disabled = flat;
  arcsBtn.title = flat ? "Routes are drawn on the sphere view" : "";
  arcsBtn.style.opacity = flat ? 0.4 : "";
  render(+slider.value);
}
vSphere.addEventListener("click", () => setView("sphere"));
vFlat.addEventListener("click", () => setView("flat"));

// start at 1 CE — a busy moment
const startIdx = STOPS.indexOf(nearestStop(1));
slider.value = startIdx; render(startIdx);

// legend
const legend = document.getElementById("legend");
Object.entries(NAMES).forEach(([k, label]) => {
  const d = document.createElement("div");
  d.innerHTML = `<i style="background:${COLORS[k]}"></i>${label}`;
  legend.appendChild(d);
});
</script>
</body>
</html>
